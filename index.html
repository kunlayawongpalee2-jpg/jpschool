<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบบันทึกการอบรม - โรงเรียนจิรพิทยา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-6xl mx-auto">
        
        <div class="bg-gradient-to-r from-indigo-900 to-slate-800 text-white p-8 rounded-3xl shadow-xl mb-6 flex flex-col md:flex-row items-center justify-between gap-6 border-b-8 border-indigo-500">
            <div class="flex items-center gap-5 text-center md:text-left">
                <div class="bg-white/10 p-4 rounded-2xl border border-white/20 hidden md:block text-4xl">🏛️</div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight uppercase">Jirapittaya School</h1>
                    <p class="text-indigo-200 font-medium">ระบบบันทึกการพัฒนาบุคลากร (Column A-I)</p>
                </div>
            </div>
            <div class="bg-indigo-600/30 px-8 py-4 rounded-2xl text-center border border-white/20 backdrop-blur-sm min-w-[220px]">
                <p class="text-[10px] uppercase tracking-widest opacity-70 mb-1">ชั่วโมงอบรมรวม (ตามปีที่เลือก)</p>
                <p id="grandTotal" class="text-4xl font-black text-yellow-400">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 sticky top-6">
                    <h2 id="formTitle" class="font-bold text-gray-800 mb-6 flex items-center gap-2 text-lg">
                        <span class="bg-indigo-600 text-white p-1.5 rounded-lg text-sm">➕</span> บันทึกข้อมูลใหม่
                    </h2>
                    <form id="trainingForm" class="space-y-4 text-sm">
                        <input type="hidden" id="editRowId">
                        
                        <div>
                            <label class="text-[11px] font-bold text-gray-400 ml-1">ปีการศึกษา</label>
                            <select id="academicYear" class="w-full mt-1 p-3 border rounded-xl bg-gray-50 font-bold outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="2568">2568</option>
                                <option value="2567">2567</option>
                                <option value="2566">2566</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-[11px] font-bold text-gray-400 ml-1">ชื่อ-นามสกุลคุณครู</label>
                            <select id="teacherName" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="">-- กรุณาเลือกชื่อ --</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-[11px] font-bold text-gray-400 ml-1">ระดับชั้น</label>
                            <select id="level" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500">
                                <option value="">-- เลือกระดับชั้น --</option>
                                <option value="ครูประถม">ครูประถม</option>
                                <option value="ครูอนุบาล">ครูอนุบาล</option>
                            </select>
                        </div>

                        <input type="text" id="courseName" placeholder="ชื่อหลักสูตรที่เข้าอบรม" required class="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500">
                        <input type="text" id="location" placeholder="สถานที่" required class="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500">
                        <input type="text" id="organizer" placeholder="หน่วยงานที่จัดอบรม" required class="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500">
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 ml-1 text-center block">วันที่อบรม</label>
                                <input type="date" id="trainingDate" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 ml-1 text-center block">จำนวนชม.</label>
                                <input type="number" id="hours" placeholder="0.0" step="0.1" required class="w-full mt-1 p-3 border rounded-xl bg-gray-50 text-center font-bold">
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-md transition-all active:scale-95 mt-2">บันทึกข้อมูล</button>
                        <button type="button" id="cancelEdit" class="w-full bg-gray-200 text-gray-600 py-3 rounded-2xl font-bold hidden">ยกเลิกการแก้ไข</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white p-4 rounded-3xl border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm">
                    <div class="flex items-center gap-2">
                        <span class="text-sm font-bold text-gray-600 italic">แสดงผลปี:</span>
                        <select id="viewYear" onchange="renderData()" class="p-2 px-5 border border-indigo-100 rounded-full font-bold text-indigo-700 bg-indigo-50 outline-none">
                            <option value="ALL">ทุกปีการศึกษา</option>
                            <option value="2568" selected>2568</option>
                            <option value="2567">2567</option>
                            <option value="2566">2566</option>
                        </select>
                    </div>
                    <div class="relative w-full md:w-64">
                        <input type="text" id="search" oninput="renderData()" placeholder="ค้นหาชื่อ/ระดับชั้น..." class="w-full pl-10 pr-4 py-2 border rounded-full text-sm outline-none focus:ring-2 focus:ring-indigo-300">
                        <span class="absolute left-4 top-2 text-gray-300">🔍</span>
                    </div>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-50 text-gray-400 text-[10px] uppercase font-black tracking-widest border-b">
                                <th class="px-6 py-4">ชื่อบุคลากร</th>
                                <th class="px-6 py-4">รายละเอียดหลักสูตร</th>
                                <th class="px-6 py-4 text-center">ชม.</th>
                                <th class="px-6 py-4 text-center">แก้ไข</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-50 text-sm"></tbody>
                    </table>
                    <div id="loader" class="text-center py-20 text-gray-400 hidden italic">กำลังเชื่อมต่อฐานข้อมูล...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfhscgmeYiq0r3QttL85mwRxQBVSjUe_ttRr1WyL54usfj-txTC44u1UE3VQhh9VkR/exec"; 

        const teachers = ["นางกิ่งกาญจน์ จันทร์ธง", "นางกัลยา วงศ์ปาลีย์", "นางชนากานต์ ธะนะคำ", "นางชนม์นิภา พงษ์บัณฑิตนุกุล", "นางชัชวาล สิริกรเกษม", "นางนันทนา คำตุ้ย", "นางบุรัสกร วงค์ชัย", "นางพัชรินทร์ ธาวงค์", "นางพิจิตรา บุญมาดวง", "นางพิมลพร อุตเรือน", "นางภูวรินทร์ แสนใจ", "นางมาริสา มหาไม้", "นางยอดยิ่ง กันทะวงค์", "นางวชิรา บุญมี", "นางวรรณวิภา จินาติ", "นางวรารัตน์ แสงสว่าง", "นางวิลดา ตาคำ", "นางศรสวรรค์ ตั๋นวัน", "นางสุจิตรา เมืองแก้ว", "นางสุธาสินี เซ็นแก้ว", "นางสุภาพ ริยะป่า", "นางอัจฉรา บุศยบุตร", "นางอรรถพล สิริรักษ์", "นางอภิวัฒน์ ธะนะคำ", "นายณัฐพงษ์ ไชยกันทา", "นายพิษณุ ธรรมตา", "นายอนุพงษ์ วรรณคำ", "ว่าที่ร้อยตรีหญิงชิดชนก นำมะ", "นางสาวแกมกมล ไชยกันทา", "นางสาวจินตนา กุนนะ", "นางสาวธวิชาทร อินทราทิพย์", "นางสาวปัฐญา สายมณี", "นางสาวพิไลลักษณ์ อะกะเรือน"];
        
        const teacherSelect = document.getElementById('teacherName');
        teachers.sort().forEach(t => { teacherSelect.innerHTML += `<option value="${t}">${t}</option>`; });

        let records = [];

        async function loadData() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const resp = await fetch(GOOGLE_SCRIPT_URL);
                records = await resp.json();
                renderData();
            } catch(e) { console.error("Error connecting to server"); }
            document.getElementById('loader').classList.add('hidden');
        }

        function renderData() {
            const tbody = document.getElementById('tableBody');
            const search = document.getElementById('search').value.toLowerCase();
            const viewYear = document.getElementById('viewYear').value;
            tbody.innerHTML = ''; 
            let grandTotal = 0;

            records.slice().reverse().forEach(r => {
                const yearMatch = (viewYear === "ALL" || r.academicYear == viewYear);
                const searchMatch = r.teacher.toLowerCase().includes(search) || (r.level && r.level.toLowerCase().includes(search));

                if(yearMatch && searchMatch) {
                    tbody.innerHTML += `<tr class="hover:bg-indigo-50/50 transition-all">
                        <td class="px-6 py-4">
                            <div class="font-bold text-indigo-900">${r.teacher}</div>
                            <div class="text-[10px] font-bold text-gray-400">${r.level || 'ไม่ระบุ'} | ปีการศึกษา ${r.academicYear}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-medium text-gray-800 leading-tight">${r.name}</div>
                            <div class="text-[10px] text-indigo-500 font-bold mt-1">📍 ${r.location} | วันที่: ${formatDate(r.date)}</div>
                        </td>
                        <td class="px-6 py-4 text-center font-black text-indigo-600 text-lg">${r.hours}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="editItem(${r.rowId})" class="p-2 px-4 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-600 hover:text-white transition-all text-xs font-bold border border-blue-100">แก้ไข</button>
                        </td>
                    </tr>`;
                    grandTotal += parseFloat(r.hours || 0);
                }
            });
            document.getElementById('grandTotal').innerText = grandTotal.toLocaleString();
        }

        function formatDate(d) {
            if(!d) return "-";
            const date = new Date(d);
            return date.toLocaleDateString('th-TH');
        }

        function editItem(id) {
            const r = records.find(x => x.rowId === id);
            if(!r) return;
            document.getElementById('editRowId').value = r.rowId;
            document.getElementById('academicYear').value = r.academicYear;
            document.getElementById('teacherName').value = r.teacher;
            document.getElementById('level').value = r.level || "";
            document.getElementById('courseName').value = r.name;
            document.getElementById('location').value = r.location;
            document.getElementById('organizer').value = r.organizer;
            
            if(r.date) {
                const d = new Date(r.date);
                const dateStr = d.toISOString().split('T')[0];
                document.getElementById('trainingDate').value = dateStr;
            }
            
            document.getElementById('hours').value = r.hours;
            document.getElementById('formTitle').innerHTML = "📝 กำลังแก้ไขข้อมูล";
            document.getElementById('submitBtn').innerText = "ยืนยันการแก้ไขข้อมูล";
            document.getElementById('submitBtn').classList.replace('bg-indigo-600', 'bg-orange-600');
            document.getElementById('cancelEdit').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        document.getElementById('cancelEdit').onclick = () => {
            document.getElementById('trainingForm').reset();
            document.getElementById('editRowId').value = "";
            document.getElementById('formTitle').innerHTML = "➕ บันทึกข้อมูลใหม่";
            document.getElementById('submitBtn').innerText = "บันทึกข้อมูล";
            document.getElementById('submitBtn').classList.replace('bg-orange-600', 'bg-indigo-600');
            document.getElementById('cancelEdit').classList.add('hidden');
        };

        document.getElementById('trainingForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editRowId').value;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";

            const data = {
                action: id ? "edit" : "add",
                rowId: id,
                academicYear: document.getElementById('academicYear').value,
                teacher: document.getElementById('teacherName').value,
                level: document.getElementById('level').value,
                name: document.getElementById('courseName').value,
                location: document.getElementById('location').value,
                organizer: document.getElementById('organizer').value,
                date: document.getElementById('trainingDate').value,
                hours: document.getElementById('hours').value
            };
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(data) 
                });
                document.getElementById('cancelEdit').click();
                loadData();
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการบันทึก");
            } finally {
                btn.disabled = false;
            }
        };

        loadData();
    </script>
</body>
</html>
