<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกการอบรม - โรงเรียนจิรพิทยา</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="p-2 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="bg-white rounded-[1.5rem] shadow-sm border border-gray-100 overflow-hidden mb-6">
            <div class="bg-gradient-to-r from-blue-900 via-indigo-800 to-indigo-900 p-6 text-white">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                    <div class="text-center md:text-left">
                        <h1 class="text-2xl md:text-4xl font-extrabold mb-1">โรงเรียนจิรพิทยา</h1>
                        <p class="text-indigo-200 text-xs md:text-sm">ระบบบันทึกการพัฒนาบุคลากร รายบุคคล</p>
                    </div>
                    <div class="bg-white/10 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/20 text-center min-w-[140px]">
                        <p id="grandTotal" class="text-3xl font-black text-yellow-400">0</p>
                        <p class="text-[10px] text-white/60 uppercase font-bold">ชั่วโมงอบรมรวม</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-[1.5rem] shadow-sm border border-gray-100 sticky top-4">
                    <h2 id="formTitle" class="font-bold text-gray-800 mb-5 text-lg flex items-center gap-2">
                        <span class="bg-green-500 text-white p-1 rounded-lg text-xs">📝</span> บันทึกข้อมูล
                    </h2>
                    <form id="trainingForm" class="space-y-4 text-sm">
                        <input type="hidden" id="editRowId">
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[11px] font-bold text-gray-400 block mb-1">ปีการศึกษา</label>
                                <select id="academicYear" class="w-full p-3 border rounded-xl bg-gray-50 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="2568">2568</option><option value="2567">2567</option><option value="2566">2566</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[11px] font-bold text-gray-400 block mb-1">ระดับชั้น</label>
                                <select id="level" required class="w-full p-3 border rounded-xl bg-gray-50 outline-none font-bold focus:ring-2 focus:ring-blue-500">
                                    <option value="">-- ระดับ --</option><option value="ครูประถม">ครูประถม</option><option value="ครูอนุบาล">ครูอนุบาล</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="text-[11px] font-bold text-gray-400 block mb-1">ชื่อ-นามสกุลบุคลากร</label>
                            <select id="teacherName" required class="w-full p-3 border rounded-xl bg-gray-50 outline-none font-bold focus:ring-2 focus:ring-blue-500">
                                <option value="">-- เลือกชื่อ --</option>
                            </select>
                        </div>

                        <input type="text" id="courseName" placeholder="ชื่อหลักสูตรที่อบรม" required class="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500">
                        
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" id="location" placeholder="สถานที่" required class="p-3 border rounded-xl bg-gray-50 outline-none">
                            <input type="text" id="organizer" placeholder="หน่วยงานที่จัด" required class="p-3 border rounded-xl bg-gray-50 outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 block mb-1">วันที่เริ่ม</label>
                                <input type="date" id="trainingDate" required class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 block mb-1">ถึงวันที่ (ถ้ามี)</label>
                                <input type="date" id="endDate" class="w-full p-3 border rounded-xl bg-gray-50 outline-none">
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-gray-400 block mb-1">จำนวนชั่วโมง</label>
                            <input type="number" id="hours" placeholder="0" step="0.1" required class="w-full p-3 border rounded-xl bg-gray-50 text-center font-black text-indigo-600 text-lg outline-none">
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 text-lg">บันทึกข้อมูล</button>
                        <button type="button" id="cancelEdit" class="w-full bg-gray-200 text-gray-600 py-3 mt-2 rounded-xl font-bold hidden">ยกเลิกแก้ไข</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white p-4 rounded-[1rem] border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-3 mb-4 shadow-sm">
                    <select id="viewYear" onchange="renderData()" class="w-full md:w-auto p-2 px-6 border rounded-full font-bold text-blue-700 bg-blue-50 outline-none">
                        <option value="ALL">ทุกปีการศึกษา</option>
                        <option value="2568" selected>2568</option>
                        <option value="2567">2567</option>
                    </select>
                    <div class="relative w-full md:w-64">
                        <input type="text" id="search" oninput="renderData()" placeholder="ค้นหาชื่อ หรือ หลักสูตร..." class="w-full px-4 py-2 border rounded-full text-sm outline-none bg-gray-50">
                    </div>
                </div>

                <div class="bg-white rounded-[1.5rem] shadow-sm border border-gray-100 overflow-hidden min-h-[400px]">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-400 text-[10px] font-black border-b">
                                <tr>
                                    <th class="px-4 py-4">รายละเอียดการอบรม</th>
                                    <th class="px-4 py-4 text-center">ชั่วโมง</th>
                                    <th class="px-4 py-4 text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                    <div id="loader" class="text-center py-10 text-gray-400 hidden italic">กำลังดึงข้อมูลล่าสุด...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // *** วาง URL ล่าสุดของคุณครูตรงนี้ ***
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxe81-9J4LqPsc4DMcCdDOnq5kWDBXVa_fIBq0DH8_PRZIep8mghXGkiQODEt0mydee/exec"; 

        const teachers = [
            "นางกิ่งกาญจน์ จันทร์ธง", "นางสาวกัลยา วงศ์ปาลีย์", "นางชนากานต์ ธะนะคำ", 
            "นางสาวชนม์นิภา พงษ์บัณฑิตนุกุล", "นายชัชวาล สิริกรเกษม", "นางนันทนา คำตุ้ย", 
            "นางสาวบุรัสกร วงค์ชัย", "นางพัชรินทร์ ธาวงค์", "นางสาวพิจิตรา บุญมาดวง", 
            "นางสาวพิมลพร อุตเรือน", "นางสาวภูวรินทร์ แสนใจ", "นางสาวมาริสา มหาไม้", 
            "นายยอดยิ่ง กันทะวงค์", "นางวชิรา บุญมี", "นางโสภิณ กันทะวงค์", "นางสาววรรณวิภา จินาติ", 
            "นางวรารัตน์ แสงสว่าง", "นางสาววิลดา ตาคำ", "นางสาวศรสวรรค์ ตั๋นวัน", 
            "นางสาวสุจิตรา เมืองแก้ว", "นางสุธาสินี เซ็นแก้ว", "นางสุภาพ ริยะป่า", 
            "นางสาวอัจฉรา บุศยบุตร", "นายอรรถพล สิริรักษ์", "นายอภิวัฒน์ ธะนะคำ", 
            "นายนัฐพงษ์ ไชยกันทา", "นายพิษณุ ธรรมตา", "นายอนุพงษ์ วรรณคำ", 
            "ว่าที่ร้อยตรีหญิงชิดชนก นำมะ", "นางสาวแกมกมล ไชยกันทา", "นางสาวจินตนา กุนนะ", 
            "นางสาวธวิชาทร อินทราทิพย์","นางสาวกฤษชาญา ศิณารา", "นางสาวปัฐญา สายมณี", "นางสาวพิไลลักษณ์ อะกะเรือน"
        ].sort();

        const teacherSelect = document.getElementById('teacherName');
        teachers.forEach(t => { 
            let opt = document.createElement('option');
            opt.value = t; opt.innerHTML = t;
            teacherSelect.appendChild(opt);
        });

        let records = [];

        async function loadData() {
            document.getElementById('loader').classList.remove('hidden');
            try { 
                const resp = await fetch(GOOGLE_SCRIPT_URL); 
                records = await resp.json(); 
                renderData(); 
            } catch(e) { console.error("Error:", e); }
            document.getElementById('loader').classList.add('hidden');
        }

        function renderData() {
            const tbody = document.getElementById('tableBody');
            const search = document.getElementById('search').value.toLowerCase();
            const viewYear = document.getElementById('viewYear').value;
            tbody.innerHTML = ''; 
            let grandTotal = 0;

            records.slice().reverse().forEach(r => {
                const searchMatch = r.teacher.toLowerCase().includes(search) || r.name.toLowerCase().includes(search);
                const yearMatch = (viewYear === "ALL" || r.academicYear == viewYear);

                if(yearMatch && searchMatch) {
                    const dateStart = r.date ? new Date(r.date).toLocaleDateString('th-TH') : '-';
                    const dateEnd = r.endDate ? ' - ' + new Date(r.endDate).toLocaleDateString('th-TH') : '';
                    
                    tbody.innerHTML += `<tr class="hover:bg-blue-50/50 transition-colors">
                        <td class="px-4 py-4">
                            <div class="font-bold text-gray-900 mb-0.5">${r.name}</div>
                            <div class="text-[10px] font-bold flex flex-wrap gap-x-2">
                                <span class="text-blue-600">${r.teacher}</span> 
                                <span class="text-gray-300">|</span> 
                                <span class="text-indigo-500">${r.level || '-'}</span>
                                <span class="text-gray-300">|</span>
                                <span class="text-gray-400 italic">🗓️ ${dateStart}${dateEnd}</span>
                            </div>
                        </td>
                        <td class="px-4 py-4 text-center font-black text-indigo-600 text-lg">${r.hours}</td>
                        <td class="px-4 py-4 text-center">
                            <button onclick="editItem('${r.rowId}')" class="p-1.5 px-3 bg-blue-50 text-blue-700 rounded-lg text-xs font-bold hover:bg-blue-600 hover:text-white transition-all">แก้ไข</button>
                        </td>
                    </tr>`;
                    grandTotal += parseFloat(r.hours || 0);
                }
            });
            document.getElementById('grandTotal').innerText = grandTotal.toLocaleString();
        }

        function editItem(id) {
            const r = records.find(x => x.rowId.toString() === id.toString());
            if(!r) return;
            document.getElementById('editRowId').value = r.rowId;
            document.getElementById('academicYear').value = r.academicYear;
            document.getElementById('teacherName').value = r.teacher;
            document.getElementById('level').value = r.level;
            document.getElementById('courseName').value = r.name;
            document.getElementById('location').value = r.location;
            document.getElementById('organizer').value = r.organizer;
            document.getElementById('hours').value = r.hours;
            
            if(r.date) document.getElementById('trainingDate').value = new Date(r.date).toISOString().split('T')[0];
            if(r.endDate) document.getElementById('endDate').value = new Date(r.endDate).toISOString().split('T')[0];
            else document.getElementById('endDate').value = "";

            document.getElementById('formTitle').innerHTML = "📝 แก้ไขข้อมูล";
            document.getElementById('submitBtn').innerText = "บันทึกการแก้ไข";
            document.getElementById('submitBtn').classList.replace('bg-indigo-600', 'bg-orange-500');
            document.getElementById('cancelEdit').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        document.getElementById('cancelEdit').onclick = () => {
            document.getElementById('trainingForm').reset();
            document.getElementById('editRowId').value = "";
            document.getElementById('formTitle').innerHTML = "📝 บันทึกข้อมูล";
            document.getElementById('submitBtn').innerText = "บันทึกข้อมูล";
            document.getElementById('submitBtn').classList.replace('bg-orange-500', 'bg-indigo-600');
            document.getElementById('cancelEdit').classList.add('hidden');
        };

        document.getElementById('trainingForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";
            
            const data = {
                action: document.getElementById('editRowId').value ? "edit" : "add",
                rowId: document.getElementById('editRowId').value,
                academicYear: document.getElementById('academicYear').value,
                teacher: document.getElementById('teacherName').value,
                level: document.getElementById('level').value,
                name: document.getElementById('courseName').value,
                location: document.getElementById('location').value,
                organizer: document.getElementById('organizer').value,
                date: document.getElementById('trainingDate').value,
                endDate: document.getElementById('endDate').value,
                hours: document.getElementById('hours').value
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                if(response.ok) {
                    document.getElementById('cancelEdit').click();
                    loadData();
                }
            } catch(e) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); }
            btn.disabled = false;
        };

        loadData();
    </script>
</body>
</html>
